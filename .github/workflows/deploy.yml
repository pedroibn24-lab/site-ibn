name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Enviar arquivos para Cpanel via FTP
    runs-on: ubuntu-latest
    steps:
    - name: Pegando o código mais recente do GitHub
      uses: actions/checkout@v4
    
    - name: Sincronizando arquivos com o servidor
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
